<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobold POS - Menu & Transaksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-color:#0d0d0d; --card-bg:#161616; --accent:#b08968; --text-main:#e0e0e0; --text-dim:#888; --border:#222; --red:#ff5f5f; --green:#22c55e; --yellow:#f59e0b; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Inter',sans-serif; background-color:var(--bg-color); color:var(--text-main); display:flex; min-height:100vh; }
        .sidebar { width:240px; background-color:var(--card-bg); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:30px 20px; flex-shrink:0; }
        .logo { font-weight:600; font-size:20px; color:var(--accent); text-transform:uppercase; letter-spacing:2px; margin-bottom:40px; text-align:center; }
        .nav-menu { flex-grow:1; }
        .nav-item { display:flex; align-items:center; padding:12px 15px; color:var(--text-dim); text-decoration:none; border-radius:8px; margin-bottom:4px; transition:0.3s; }
        .nav-item i { margin-right:12px; width:20px; }
        .nav-item:hover,.nav-item.active { background-color:#222; color:var(--accent); }
        .btn-logout { background:none; border:1px solid #444; color:var(--red); padding:10px; border-radius:8px; cursor:pointer; font-weight:600; transition:0.3s; width:100%; font-family:'Inter',sans-serif; font-size:14px; }
        .btn-logout:hover { background:var(--red); color:white; }
        .main-content { flex-grow:1; padding:40px; overflow-y:auto; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .header h1 { font-size:24px; margin:0; }
        .tabs { display:flex; gap:4px; background:var(--card-bg); border:1px solid var(--border); border-radius:10px; padding:4px; width:fit-content; margin-bottom:24px; }
        .tab-btn { padding:8px 20px; border-radius:7px; border:none; background:none; color:var(--text-dim); font-family:'Inter',sans-serif; font-size:14px; cursor:pointer; transition:0.2s; }
        .tab-btn.active { background:#222; color:var(--accent); font-weight:600; }
        .section { display:none; }
        .section.active { display:block; }
        .card { background-color:var(--card-bg); border-radius:16px; padding:20px; border:1px solid var(--border); margin-bottom:20px; }
        .card-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
        .card-head h2 { font-size:18px; }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; color:var(--text-dim); font-size:13px; padding:12px; border-bottom:1px solid var(--border); font-weight:400; }
        td { padding:15px 12px; font-size:14px; border-bottom:1px solid #1a1a1a; }
        tr:last-child td { border-bottom:none; }
        .badge { padding:4px 8px; border-radius:4px; font-size:11px; font-weight:600; }
        .badge-red    { background:rgba(255,95,95,0.2);   color:var(--red); }
        .badge-green  { background:rgba(34,197,94,0.2);   color:var(--green); }
        .badge-yellow { background:rgba(245,158,11,0.2);  color:var(--yellow); }
        .badge-accent { background:rgba(176,137,104,0.2); color:var(--accent); }
        .btn-primary { background:var(--accent); color:white; border:none; border-radius:8px; padding:10px 20px; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:0.3s; display:inline-flex; align-items:center; gap:8px; }
        .btn-primary:hover { background:#c49a7a; }
        .btn-sm { background:none; border:1px solid var(--border); border-radius:6px; padding:5px 12px; font-size:12px; color:var(--text-dim); cursor:pointer; font-family:'Inter',sans-serif; transition:0.2s; }
        .btn-sm:hover { border-color:var(--accent); color:var(--accent); }
        .btn-sm.danger:hover { border-color:var(--red); color:var(--red); }
        .search-input { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:9px 14px; color:var(--text-main); font-family:'Inter',sans-serif; font-size:14px; outline:none; width:220px; }
        .search-input:focus { border-color:var(--accent); }
        .filter-select { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text-main); font-family:'Inter',sans-serif; font-size:13px; outline:none; cursor:pointer; }
        .filter-select option { background:#161616; }
        .avail-toggle { display:inline-flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; }
        .avail-toggle input { accent-color:var(--accent); cursor:pointer; }
        /* MODAL */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity 0.2s; }
        .modal-overlay.show { opacity:1; pointer-events:all; }
        .modal { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:30px; width:100%; max-width:460px; max-height:90vh; overflow-y:auto; transform:scale(0.95); transition:transform 0.2s; }
        .modal-overlay.show .modal { transform:scale(1); }
        .modal h2 { font-size:18px; margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:7px; }
        .form-group input,.form-group select { width:100%; background:#0d0d0d; border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text-main); font-family:'Inter',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
        .form-group input:focus,.form-group select:focus { border-color:var(--accent); }
        .form-group select option { background:#161616; }
        .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .modal-footer { display:flex; gap:10px; margin-top:22px; }
        .btn-cancel { flex:1; padding:11px; background:none; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); font-family:'Inter',sans-serif; font-size:14px; cursor:pointer; transition:0.2s; }
        .btn-cancel:hover { border-color:var(--text-dim); color:var(--text-main); }
        .btn-save { flex:2; padding:11px; background:var(--accent); border:none; border-radius:8px; color:white; font-family:'Inter',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:0.2s; }
        .btn-save:hover { background:#c49a7a; }
        .btn-save:disabled { opacity:0.4; cursor:default; }
        /* order detail */
        .detail-row { display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom:1px solid #1a1a1a; color:var(--text-dim); }
        .detail-row:last-child { border-bottom:none; }
        .detail-row span:last-child { color:var(--text-main); }
        .detail-total { display:flex; justify-content:space-between; font-size:15px; font-weight:600; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
        .detail-total span:last-child { color:var(--accent); }
        /* TOAST */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card-bg); border:1px solid var(--border); border-radius:9px; padding:12px 24px; font-size:14px; z-index:999; transition:transform 0.3s ease; white-space:nowrap; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.success { border-color:rgba(34,197,94,0.5); color:var(--green); }
        .toast.error   { border-color:rgba(255,95,95,0.5);  color:var(--red); }
        #loadingOverlay { position:fixed; inset:0; background:var(--bg-color); display:flex; align-items:center; justify-content:center; z-index:9999; font-size:20px; font-weight:600; color:var(--accent); letter-spacing:3px; }
        .empty-cell { text-align:center; color:var(--text-dim); padding:36px!important; font-size:14px; }
    </style>
</head>
<body>
<div id="loadingOverlay">COBOLD POS</div>

<div class="sidebar">
    <div class="logo">Cobold POS</div>
    <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="kasir.html"     class="nav-item"><i class="fa-solid fa-cash-register"></i> Transaksi</a>
        <a href="admin.html"     class="nav-item active"><i class="fa-solid fa-mug-hot"></i> Menu</a>
        <a href="inventory.html" class="nav-item"><i class="fa-solid fa-box"></i> Inventori</a>
    </nav>
    <button class="btn-logout" id="btn-logout">LOGOUT</button>
</div>

<div class="main-content">
    <div class="header">
        <h1>Manajemen</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('menu',this)">☕ Menu</button>
        <button class="tab-btn"        onclick="showTab('transaksi',this)">🧾 Transaksi</button>
    </div>

    <!-- TAB MENU -->
    <div class="section active" id="sec-menu">
        <div class="card">
            <div class="card-head">
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    <h2>Daftar Menu</h2>
                    <input class="search-input" type="text" id="menuSearch" placeholder="Cari menu..." oninput="renderMenuTable()" style="width:180px"/>
                </div>
                <button class="btn-primary" onclick="openMenuModal()"><i class="fa-solid fa-plus"></i> Tambah Menu</button>
            </div>
            <table>
                <thead><tr><th>Nama</th><th>Kategori</th><th>Harga</th><th>Tersedia</th><th>Aksi</th></tr></thead>
                <tbody id="menuTbody"><tr><td colspan="5" class="empty-cell">Memuat...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- TAB TRANSAKSI -->
    <div class="section" id="sec-transaksi">
        <div class="card">
            <div class="card-head">
                <h2>Riwayat Transaksi</h2>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <select class="filter-select" id="filterStatus" onchange="renderTransaksi()">
                        <option value="">Semua Status</option>
                        <option value="pending">Pending</option>
                        <option value="done">Done</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <select class="filter-select" id="filterType" onchange="renderTransaksi()">
                        <option value="">Semua Tipe</option>
                        <option value="dine-in">Dine-in</option>
                        <option value="takeaway">Takeaway</option>
                    </select>
                </div>
            </div>
            <table>
                <thead><tr><th>Waktu</th><th>Kasir</th><th>Tipe</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody id="transaksiTbody"><tr><td colspan="6" class="empty-cell">Memuat...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<!-- MODAL MENU -->
<div class="modal-overlay" id="menuModal">
    <div class="modal">
        <h2 id="menuModalTitle">Tambah Menu</h2>
        <input type="hidden" id="menuEditId"/>
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="mName" placeholder="cth: Cappuccino"/>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Harga (Rp)</label>
                <input type="number" id="mPrice" placeholder="32000"/>
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select id="mCategory">
                    <option>Espresso</option><option>Manual Brew</option>
                    <option>Signature</option><option>Bites</option><option>Lainnya</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:14px">
                <input type="checkbox" id="mAvail" checked style="accent-color:var(--accent);width:16px;height:16px"/>
                Tersedia (tampil di kasir)
            </label>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeMenuModal()">Batal</button>
            <button class="btn-save"   id="menuSaveBtn" onclick="submitMenu()">Simpan</button>
        </div>
    </div>
</div>

<!-- MODAL ORDER DETAIL -->
<div class="modal-overlay" id="orderModal">
    <div class="modal">
        <h2>Detail Pesanan</h2>
        <div id="orderDetail"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeOrderModal()">Tutup</button>
            <button class="btn-save"   id="btnDone" onclick="markDone()">Tandai Selesai</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, doc, getDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey:"AIzaSyAIBQseS7GTzddBODZcLm-iD_ol79rL6PA", authDomain:"cobold-b0e8d.firebaseapp.com",
        projectId:"cobold-b0e8d", storageBucket:"cobold-b0e8d.firebasestorage.app",
        messagingSenderId:"317072309656", appId:"1:317072309656:web:803003d311f119e437bfed"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let menuData = [], ordersData = [], activeOrderId = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { location.href = "login.html"; return; }
        const snap = await getDoc(doc(db, "users", user.uid));
        if (!snap.exists() || snap.data().role !== 'admin') { location.href = "login.html"; return; }
        await Promise.all([loadMenu(), loadOrders()]);
        renderMenuTable();
        renderTransaksi();
        document.getElementById('loadingOverlay').style.display = 'none';
    });

    async function loadMenu() {
        const snap = await getDocs(query(collection(db, "menu"), orderBy("category")));
        menuData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }
    async function loadOrders() {
        const snap = await getDocs(query(collection(db, "orders"), orderBy("createdAt","desc")));
        ordersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }

    window.showTab = function(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + id).classList.add('active');
        btn.classList.add('active');
    };

    // ── MENU ──
    window.renderMenuTable = function() {
        const q = document.getElementById('menuSearch').value.toLowerCase();
        const tbody = document.getElementById('menuTbody');
        const list  = menuData.filter(m => !q || m.name.toLowerCase().includes(q));
        if (!list.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty-cell">Tidak ada menu.</td></tr>`; return; }
        tbody.innerHTML = list.map(m => `<tr>
            <td><strong>${m.name}</strong></td>
            <td><span class="badge badge-accent">${m.category||'—'}</span></td>
            <td>Rp ${(m.price||0).toLocaleString('id')}</td>
            <td>
                <label class="avail-toggle">
                    <input type="checkbox" ${m.available!==false?'checked':''} onchange="toggleAvail('${m.id}',this.checked)"/>
                    ${m.available!==false?'Ya':'Tidak'}
                </label>
            </td>
            <td>
                <button class="btn-sm" onclick="openMenuModal('${m.id}')">Edit</button>
                <button class="btn-sm danger" onclick="deleteMenu('${m.id}')">Hapus</button>
            </td>
        </tr>`).join('');
    };

    window.openMenuModal = function(id) {
        document.getElementById('menuEditId').value = id || '';
        if (id) {
            const m = menuData.find(x => x.id === id);
            document.getElementById('menuModalTitle').textContent = 'Edit Menu';
            document.getElementById('mName').value     = m.name;
            document.getElementById('mPrice').value    = m.price;
            document.getElementById('mCategory').value = m.category || 'Lainnya';
            document.getElementById('mAvail').checked  = m.available !== false;
        } else {
            document.getElementById('menuModalTitle').textContent = 'Tambah Menu';
            document.getElementById('mName').value = '';
            document.getElementById('mPrice').value = '';
            document.getElementById('mAvail').checked = true;
        }
        document.getElementById('menuModal').classList.add('show');
    };
    window.closeMenuModal = function() { document.getElementById('menuModal').classList.remove('show'); };

    window.submitMenu = async function() {
        const btn  = document.getElementById('menuSaveBtn');
        const id   = document.getElementById('menuEditId').value;
        const name = document.getElementById('mName').value.trim();
        const price = parseFloat(document.getElementById('mPrice').value);
        const category = document.getElementById('mCategory').value;
        const available = document.getElementById('mAvail').checked;
        if (!name || isNaN(price)) { toast('Nama dan harga wajib diisi.','error'); return; }
        btn.disabled = true; btn.textContent = 'Menyimpan...';
        try {
            if (id) await updateDoc(doc(db,"menu",id), {name,price,category,available});
            else    await addDoc(collection(db,"menu"), {name,price,category,available,createdAt:serverTimestamp()});
            await loadMenu(); renderMenuTable(); closeMenuModal();
            toast('✓ Menu disimpan','success');
        } catch(e) { toast('Error: '+e.message,'error'); }
        btn.disabled = false; btn.textContent = 'Simpan';
    };

    window.toggleAvail = async function(id, val) {
        try { await updateDoc(doc(db,"menu",id), {available:val}); await loadMenu(); renderMenuTable(); }
        catch(e) { toast('Error: '+e.message,'error'); }
    };

    window.deleteMenu = async function(id) {
        const m = menuData.find(x => x.id === id);
        if (!confirm(`Hapus menu "${m?.name}"?`)) return;
        try { await deleteDoc(doc(db,"menu",id)); await loadMenu(); renderMenuTable(); toast('Menu dihapus','success'); }
        catch(e) { toast('Error: '+e.message,'error'); }
    };

    // ── TRANSAKSI ──
    window.renderTransaksi = function() {
        const st = document.getElementById('filterStatus').value;
        const tp = document.getElementById('filterType').value;
        const tbody = document.getElementById('transaksiTbody');
        let list = ordersData;
        if (st) list = list.filter(o => o.status === st);
        if (tp) list = list.filter(o => o.type === tp);
        if (!list.length) { tbody.innerHTML = `<tr><td colspan="6" class="empty-cell">Tidak ada transaksi.</td></tr>`; return; }
        tbody.innerHTML = list.map(o => {
            const ts  = o.createdAt?.toDate ? o.createdAt.toDate() : new Date((o.createdAt?.seconds||0)*1000);
            const tStr = ts.toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
            const sCls = o.status==='done'?'badge-green':o.status==='cancelled'?'badge-red':'badge-yellow';
            return `<tr>
                <td>${tStr}</td>
                <td>${o.kasirName||'—'}</td>
                <td>${o.type==='dine-in'?`Dine-in #${o.tableNo||'?'}`:'Takeaway'}</td>
                <td>Rp ${(o.total||0).toLocaleString('id')}</td>
                <td><span class="badge ${sCls}">${o.status}</span></td>
                <td>
                    <button class="btn-sm" onclick="openOrderDetail('${o.id}')">Detail</button>
                    ${o.status==='pending'?`<button class="btn-sm danger" onclick="cancelOrder('${o.id}')">Batal</button>`:''}
                </td>
            </tr>`;
        }).join('');
    };

    window.openOrderDetail = function(id) {
        activeOrderId = id;
        const o = ordersData.find(x => x.id === id);
        const ts = o.createdAt?.toDate ? o.createdAt.toDate() : new Date((o.createdAt?.seconds||0)*1000);
        const sCls = o.status==='done'?'badge-green':o.status==='cancelled'?'badge-red':'badge-yellow';
        document.getElementById('orderDetail').innerHTML = `
            <p style="font-size:13px;color:var(--text-dim);margin-bottom:14px">${ts.toLocaleString('id-ID')} · ${o.kasirName||'—'} · <span class="badge ${sCls}">${o.status}</span></p>
            ${(o.items||[]).map(i=>`<div class="detail-row"><span>${i.name} ×${i.qty}</span><span>Rp ${(i.price*i.qty).toLocaleString('id')}</span></div>`).join('')}
            ${o.notes?`<div class="detail-row"><span>Catatan</span><span>${o.notes}</span></div>`:''}
            <div class="detail-total"><span>Total</span><span>Rp ${(o.total||0).toLocaleString('id')}</span></div>
        `;
        document.getElementById('btnDone').style.display = o.status==='pending' ? '' : 'none';
        document.getElementById('orderModal').classList.add('show');
    };
    window.closeOrderModal = function() { document.getElementById('orderModal').classList.remove('show'); };

    window.markDone = async function() {
        try { await updateDoc(doc(db,"orders",activeOrderId),{status:"done"}); closeOrderModal(); await loadOrders(); renderTransaksi(); toast('✓ Pesanan selesai','success'); }
        catch(e) { toast('Error: '+e.message,'error'); }
    };

    window.cancelOrder = async function(id) {
        if (!confirm('Batalkan transaksi ini?')) return;
        try { await updateDoc(doc(db,"orders",id),{status:"cancelled"}); await loadOrders(); renderTransaksi(); toast('Transaksi dibatalkan','success'); }
        catch(e) { toast('Error: '+e.message,'error'); }
    };

    function toast(msg,type='') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${type} show`;
        setTimeout(()=>t.classList.remove('show'),2400);
    }

    document.getElementById('btn-logout').addEventListener('click',()=>signOut(auth).then(()=>location.href="login.html"));
</script>
</body>
</html>
