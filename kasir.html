<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobold POS - Transaksi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent: #b08968;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border: #222;
            --red: #ff5f5f;
            --green: #22c55e;
            --yellow: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            flex-shrink: 0;
        }
        .logo { font-weight: 600; font-size: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; text-align: center; }
        .nav-menu { flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: var(--text-dim); text-decoration: none; border-radius: 8px; margin-bottom: 4px; transition: 0.3s; }
        .nav-item i { margin-right: 12px; width: 20px; }
        .nav-item:hover, .nav-item.active { background-color: #222; color: var(--accent); }
        .nav-item.admin-only { display: none; }
        .btn-logout { background: none; border: 1px solid #444; color: var(--red); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; width: 100%; font-family: 'Inter', sans-serif; font-size: 14px; }
        .btn-logout:hover { background: var(--red); color: white; }

        /* LAYOUT */
        .pos-layout { display: flex; flex: 1; overflow: hidden; }

        /* MENU PANEL */
        .menu-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .menu-toolbar {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            width: 200px;
        }
        .search-input:focus { border-color: var(--accent); }
        .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
        .cat-pill {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cat-pill:hover { border-color: var(--accent); color: var(--accent); }
        .cat-pill.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }

        .menu-grid {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 12px;
            align-content: start;
        }
        .menu-grid::-webkit-scrollbar { width: 4px; }
        .menu-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .menu-card:active { transform: translateY(0); }
        .menu-card.unavail { opacity: 0.35; pointer-events: none; }
        .menu-card-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 6px; }
        .menu-card-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
        .menu-card-price { font-size: 14px; color: var(--accent); font-weight: 600; }
        .menu-empty { grid-column: 1/-1; text-align: center; padding: 48px; color: var(--text-dim); font-size: 14px; }

        /* ORDER PANEL */
        .order-panel {
            width: 320px;
            border-left: 1px solid var(--border);
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .order-head {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .order-head-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .order-head-top h2 { font-size: 16px; }
        .btn-clear { background: none; border: none; color: var(--text-dim); font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; text-decoration: underline; padding: 0; transition: 0.2s; }
        .btn-clear:hover { color: var(--red); }
        .type-toggle { display: flex; gap: 6px; }
        .type-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: none;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .type-btn.active { background: #222; border-color: var(--accent); color: var(--text-main); }
        .table-input { margin-top: 10px; display: none; }
        .table-input.show { display: block; }
        .table-input label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
        .table-input input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
        }
        .table-input input:focus { border-color: var(--accent); }

        .order-items { flex: 1; overflow-y: auto; padding: 14px 20px; }
        .order-items::-webkit-scrollbar { width: 3px; }
        .order-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .order-empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 36px 0; font-style: italic; }
        .order-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .order-item:last-child { border-bottom: none; }
        .oi-info { flex: 1; }
        .oi-name  { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .oi-price { font-size: 12px; color: var(--text-dim); }
        .qty-ctrl { display: flex; align-items: center; gap: 8px; }
        .qty-btn {
            width: 26px; height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #222;
            color: var(--text-main);
            font-size: 15px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
            line-height: 1;
        }
        .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
        .qty-num { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }

        .order-notes { padding: 10px 20px; border-top: 1px solid var(--border); }
        .order-notes label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
        .order-notes textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            outline: none;
            resize: none;
            height: 54px;
        }
        .order-notes textarea:focus { border-color: var(--accent); }

        .order-foot { padding: 16px 20px; border-top: 1px solid var(--border); }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .total-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
        .total-value { font-size: 24px; font-weight: 600; color: var(--accent); }
        .btn-pay {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-pay:hover { background: #c49a7a; }
        .btn-pay:disabled { opacity: 0.4; cursor: default; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: 100%; max-width: 400px; transform: scale(0.95); transition: transform 0.2s; }
        .modal-overlay.show .modal { transform: scale(1); }
        .modal h2 { font-size: 18px; margin-bottom: 6px; }
        .modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
        .modal-items { background: var(--bg-color); border-radius: 10px; padding: 14px; margin-bottom: 16px; }
        .modal-item-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; color: var(--text-dim); }
        .modal-item-row span:last-child { color: var(--text-main); }
        .modal-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
        .modal-total { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; }
        .modal-total span:last-child { color: var(--accent); }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal-cancel { flex: 1; padding: 11px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-modal-cancel:hover { border-color: var(--text-dim); color: var(--text-main); }
        .btn-modal-confirm { flex: 2; padding: 11px; background: var(--accent); border: none; border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-modal-confirm:hover { background: #c49a7a; }
        .btn-modal-confirm:disabled { opacity: 0.5; cursor: default; }

        /* TOAST */
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card-bg); border: 1px solid var(--border); border-radius: 9px; padding: 12px 24px; font-size: 14px; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: rgba(34,197,94,0.5); color: var(--green); }
        .toast.error   { border-color: rgba(255,95,95,0.5);  color: var(--red); }

        #loadingOverlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 9999; font-size: 20px; font-weight: 600; color: var(--accent); letter-spacing: 3px; }
    </style>
</head>
<body>

<div id="loadingOverlay">COBOLD POS</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Cobold POS</div>
    <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="kasir.html"     class="nav-item active"><i class="fa-solid fa-cash-register"></i> Transaksi</a>
        <a href="admin.html"     class="nav-item admin-only"><i class="fa-solid fa-mug-hot"></i> Menu</a>
        <a href="inventory.html" class="nav-item admin-only"><i class="fa-solid fa-box"></i> Inventori</a>
    </nav>
    <button class="btn-logout" id="btn-logout">LOGOUT</button>
</div>

<!-- POS -->
<div class="pos-layout">
    <!-- MENU -->
    <div class="menu-panel">
        <div class="menu-toolbar">
            <input class="search-input" type="text" id="searchInput" placeholder="Cari menu..." oninput="renderMenu()"/>
            <div class="cat-pills" id="catPills"></div>
        </div>
        <div class="menu-grid" id="menuGrid">
            <div class="menu-empty">Memuat menu...</div>
        </div>
    </div>

    <!-- ORDER -->
    <div class="order-panel">
        <div class="order-head">
            <div class="order-head-top">
                <h2>Pesanan</h2>
                <button class="btn-clear" onclick="clearCart()">Hapus semua</button>
            </div>
            <div class="type-toggle">
                <button class="type-btn active" id="btnDineIn"   onclick="setType('dine-in')">🍽 Dine-in</button>
                <button class="type-btn"        id="btnTakeaway" onclick="setType('takeaway')">🥡 Takeaway</button>
            </div>
            <div class="table-input show" id="tableWrap">
                <label>Nomor Meja</label>
                <input type="text" id="tableNo" placeholder="contoh: 5"/>
            </div>
        </div>
        <div class="order-items" id="orderItems">
            <div class="order-empty">Pilih menu untuk memulai pesanan.</div>
        </div>
        <div class="order-notes">
            <label>Catatan</label>
            <textarea id="orderNotes" placeholder="Less sugar, extra hot, dll..."></textarea>
        </div>
        <div class="order-foot">
            <div class="total-row">
                <span class="total-label">Total</span>
                <span class="total-value" id="totalValue">Rp 0</span>
            </div>
            <button class="btn-pay" id="btnPay" onclick="openConfirm()" disabled>
                Proses Pesanan
            </button>
        </div>
    </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <h2>Konfirmasi Pesanan</h2>
        <p class="modal-sub">Periksa kembali pesanan sebelum diproses.</p>
        <div class="modal-items" id="confirmItems"></div>
        <div class="modal-footer">
            <button class="btn-modal-cancel"  onclick="closeConfirm()">Batal</button>
            <button class="btn-modal-confirm" id="btnConfirm" onclick="submitOrder()">Konfirmasi</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, doc, getDoc, updateDoc, increment, serverTimestamp, query, orderBy }
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAIBQseS7GTzddBODZcLm-iD_ol79rL6PA",
        authDomain: "cobold-b0e8d.firebaseapp.com",
        projectId: "cobold-b0e8d",
        storageBucket: "cobold-b0e8d.firebasestorage.app",
        messagingSenderId: "317072309656",
        appId: "1:317072309656:web:803003d311f119e437bfed"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let menuItems   = [];
    let cart        = [];
    let orderType   = 'dine-in';
    let activeCategory = 'Semua';

    // AUTH GUARD — kasir + admin
    onAuthStateChanged(auth, async (user) => {
        if (!user) { location.href = "login.html"; return; }
        const snap = await getDoc(doc(db, "users", user.uid));
        if (!snap.exists()) { await signOut(auth); location.href = "login.html"; return; }
        const role = snap.data().role;
        if (role !== 'kasir' && role !== 'admin') { location.href = "login.html"; return; }
        currentUser = { uid: user.uid, name: snap.data().name || user.email, role };
        if (role === 'admin') {
            document.querySelectorAll('.nav-item.admin-only').forEach(el => el.style.display = 'flex');
        }
        await loadMenu();
        document.getElementById('loadingOverlay').style.display = 'none';
    });

    async function loadMenu() {
        const snap = await getDocs(query(collection(db, "menu"), orderBy("category")));
        menuItems = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => m.available !== false);
        buildCategoryPills();
        renderMenu();
    }

    function buildCategoryPills() {
        const cats  = ['Semua', ...new Set(menuItems.map(m => m.category).filter(Boolean))];
        const pills = document.getElementById('catPills');
        pills.innerHTML = cats.map(c =>
            `<button class="cat-pill${c === activeCategory ? ' active' : ''}" onclick="setCategory('${c}')">${c}</button>`
        ).join('');
    }

    window.setCategory = function(cat) {
        activeCategory = cat;
        document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.textContent === cat));
        renderMenu();
    };

    window.renderMenu = function() {
        const q    = document.getElementById('searchInput').value.toLowerCase();
        const grid = document.getElementById('menuGrid');
        const list = menuItems.filter(m => {
            const matchCat  = activeCategory === 'Semua' || m.category === activeCategory;
            const matchText = !q || m.name.toLowerCase().includes(q);
            return matchCat && matchText;
        });
        if (!list.length) {
            grid.innerHTML = `<div class="menu-empty">Menu tidak ditemukan.</div>`; return;
        }
        grid.innerHTML = list.map(m => `
            <div class="menu-card" onclick="addToCart('${m.id}')">
                <div class="menu-card-cat">${m.category || ''}</div>
                <div class="menu-card-name">${m.name}</div>
                <div class="menu-card-price">Rp ${(m.price||0).toLocaleString('id')}</div>
            </div>
        `).join('');
    };

    window.addToCart = function(id) {
        const item = menuItems.find(m => m.id === id);
        if (!item) return;
        const ex = cart.find(c => c.id === id);
        if (ex) ex.qty++;
        else cart.push({ id, name: item.name, price: item.price, qty: 1 });
        renderCart();
        toast(`+ ${item.name}`, 'success');
    };

    window.changeQty = function(id, delta) {
        const idx = cart.findIndex(c => c.id === id);
        if (idx < 0) return;
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        renderCart();
    };

    window.clearCart = function() { cart = []; renderCart(); };

    function renderCart() {
        const wrap  = document.getElementById('orderItems');
        const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
        document.getElementById('totalValue').textContent = 'Rp ' + total.toLocaleString('id');
        document.getElementById('btnPay').disabled = cart.length === 0;
        if (!cart.length) {
            wrap.innerHTML = `<div class="order-empty">Pilih menu untuk memulai pesanan.</div>`; return;
        }
        wrap.innerHTML = cart.map(c => `
            <div class="order-item">
                <div class="oi-info">
                    <div class="oi-name">${c.name}</div>
                    <div class="oi-price">Rp ${(c.price * c.qty).toLocaleString('id')}</div>
                </div>
                <div class="qty-ctrl">
                    <button class="qty-btn" onclick="changeQty('${c.id}',-1)">−</button>
                    <span class="qty-num">${c.qty}</span>
                    <button class="qty-btn" onclick="changeQty('${c.id}',1)">+</button>
                </div>
            </div>
        `).join('');
    }

    window.setType = function(type) {
        orderType = type;
        document.getElementById('btnDineIn').classList.toggle('active', type === 'dine-in');
        document.getElementById('btnTakeaway').classList.toggle('active', type === 'takeaway');
        document.getElementById('tableWrap').classList.toggle('show', type === 'dine-in');
    };

    window.openConfirm = function() {
        if (!cart.length) return;
        const total   = cart.reduce((s, c) => s + c.price * c.qty, 0);
        const tableNo = document.getElementById('tableNo').value;
        const notes   = document.getElementById('orderNotes').value;
        const wrap    = document.getElementById('confirmItems');
        wrap.innerHTML = `
            ${cart.map(c => `
                <div class="modal-item-row">
                    <span>${c.name} ×${c.qty}</span>
                    <span>Rp ${(c.price * c.qty).toLocaleString('id')}</span>
                </div>`).join('')}
            <hr class="modal-divider"/>
            <div class="modal-item-row">
                <span>Tipe</span>
                <span>${orderType === 'dine-in' ? `Dine-in (Meja ${tableNo || '—'})` : 'Takeaway'}</span>
            </div>
            ${notes ? `<div class="modal-item-row"><span>Catatan</span><span>${notes}</span></div>` : ''}
            <hr class="modal-divider"/>
            <div class="modal-total"><span>Total</span><span>Rp ${total.toLocaleString('id')}</span></div>
        `;
        document.getElementById('confirmModal').classList.add('show');
    };

    window.closeConfirm = function() {
        document.getElementById('confirmModal').classList.remove('show');
    };

    window.submitOrder = async function() {
        const btn = document.getElementById('btnConfirm');
        btn.disabled = true; btn.textContent = 'Menyimpan...';
        try {
            const total   = cart.reduce((s, c) => s + c.price * c.qty, 0);
            const tableNo = document.getElementById('tableNo').value;
            const notes   = document.getElementById('orderNotes').value;

            // Save order
            await addDoc(collection(db, "orders"), {
                items:     cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty })),
                total, type: orderType,
                tableNo:   orderType === 'dine-in' ? tableNo : null,
                notes:     notes || null,
                status:    "pending",
                kasirUid:  currentUser.uid,
                kasirName: currentUser.name,
                createdAt: serverTimestamp()
            });

            // Deduct stock based on recipe
            for (const cartItem of cart) {
                const menuDoc = await getDoc(doc(db, "menu", cartItem.id));
                const recipe  = menuDoc.data()?.recipe || [];
                for (const r of recipe) {
                    if (!r.ingredientId || !r.amount) continue;
                    const deduct = r.amount * cartItem.qty;
                    await updateDoc(doc(db, "ingredients", r.ingredientId), {
                        stock: increment(-deduct)
                    });
                    // Log stock change
                    const ingDoc = await getDoc(doc(db, "ingredients", r.ingredientId));
                    await addDoc(collection(db, "stockLogs"), {
                        ingredientId:   r.ingredientId,
                        ingredientName: ingDoc.data()?.name || r.ingredientId,
                        unit:           ingDoc.data()?.unit || '',
                        change:         -deduct,
                        note:           `Order: ${cartItem.name} ×${cartItem.qty}`,
                        byName:         currentUser.name,
                        createdAt:      serverTimestamp()
                    });
                }
            }

            closeConfirm();
            clearCart();
            document.getElementById('tableNo').value   = '';
            document.getElementById('orderNotes').value = '';
            toast('✓ Pesanan berhasil disimpan!', 'success');
        } catch (e) {
            toast('Gagal: ' + e.message, 'error');
        }
        btn.disabled = false; btn.textContent = 'Konfirmasi';
    };

    function toast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
        signOut(auth).then(() => location.href = "login.html");
    });
</script>
</body>
</html>
