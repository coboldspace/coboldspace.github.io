<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobold POS - Barista Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent: #b08968; /* Warna Cokelat Kopi */
            --text-main: #e0e0e0;
            --text-dim: #888;
            --input-bg: #0f0f0f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .logo {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: var(--input-bg);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #111;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        #error-message {
            color: #ff5f5f;
            font-size: 12px;
            margin-top: 15px;
            display: none;
        }

        .loading-spinner {
            display: none;
            margin: 10px auto;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(176, 137, 104, 0.3);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">Cobold POS</div>
    <div class="subtitle">Sistem Internal Kedai Kopi</div>

    <form id="login-form">
        <div class="form-group">
            <label>Email Barista</label>
            <input type="email" id="email" placeholder="nama@cobold.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" id="btn-login">MASUK</button>
        <div class="loading-spinner" id="spinner"></div>
    </form>

    <div id="error-message">Email atau password salah.</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Pake Config lo yang tadi
    const firebaseConfig = {
        apiKey: "AIzaSyAIBQseS7GTzddBODZcLm-iD_ol79rL6PA",
        authDomain: "cobold-b0e8d.firebaseapp.com",
        projectId: "cobold-b0e8d",
        storageBucket: "cobold-b0e8d.firebasestorage.app",
        messagingSenderId: "317072309656",
        appId: "1:317072309656:web:803003d311f119e437bfed",
        measurementId: "G-JGJJM01M2Y"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const loginForm = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-message');
    const spinner = document.getElementById('spinner');
    const btnLogin = document.getElementById('btn-login');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // UI Feedback
        errorMsg.style.display = 'none';
        spinner.style.display = 'block';
        btnLogin.style.display = 'none';

        try {
            await signInWithEmailAndPassword(auth, email, password);
            // Jika sukses, lempar ke dashboard (kita buat nanti)
            // alert("Login Berhasil! Selamat bekerja.");
             window.location.href = "dashboard.html"; 
        } catch (error) {
            console.error(error);
            errorMsg.style.display = 'block';
            spinner.style.display = 'none';
            btnLogin.style.display = 'block';
        }
    });
</script>

</body>
</html>
